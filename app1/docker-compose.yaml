name: app1

services:
  app1:
    image: nginx:1.28-alpine
    container_name: app1
    ports: 
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always
    logging:
      driver: loki
      options:
        loki-url: "http://172.17.0.1:3100/loki/api/v1/push"
        loki-retries: 2
        loki-timeout: 2s
        loki-batch-size: "50"
        keep-file: 'true'
        mode: "non-blocking"
        max-buffer-size: "4m"
    networks:
      - network

networks:
  network:
    name: app1
    driver: bridge